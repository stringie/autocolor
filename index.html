<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script defer src="https://docs.opencv.org/4.6.0/opencv.js" type="text/javascript"></script>
    <title>Autocolor</title>
</head>

<body>
    <div>
        <img hidden id="imageSrc" alt="No Image" />
        <input type="file" id="fileInput" name="file" />
        <canvas id="canvasOutput"></canvas>
    </div>
    <script type="text/javascript">
        let imgElement = document.getElementById('imageSrc');
        let inputElement = document.getElementById('fileInput');
        
        // Selection of colors with which to randomly fill assumed coloring page
        let colors = [[150, 20, 30, 255], [220, 110, 60, 255], [10, 70, 210, 255], [110, 220, 220, 255], [42, 232, 111, 255], [1, 34, 111, 255], [111, 1, 1, 255]]

        // Move through the image, pixel by pixel, looking for a white pixel
        function locateWhite(img, startpos) {
            while 
            (
                img.data[startpos[0] * img.cols * img.channels() + startpos[1] * img.channels()] != 255 ||
                img.data[startpos[0] * img.cols * img.channels() + startpos[1] * img.channels() + 1] != 255 ||
                img.data[startpos[0] * img.cols * img.channels() + startpos[1] * img.channels() + 2] != 255
            ) {
                startpos[1] = (startpos[1] + 1) % img.cols
                if (startpos[1] == 0) {
                    startpos[0] += 1;
                }
                
                if (startpos[0] == img.rows - 1 && startpos[1] == img.cols - 1) {
                    return null
                }
            }

            return startpos
        };

        function threshold(img) {
            let dst = new cv.Mat()

            cv.adaptiveThreshold(img, dst, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 43, 20)

            return dst;
        }

        function max(img) {
            let out = new cv.Mat(img.rows, img.cols, cv.CV_8UC1);

            for (let i = 0; i < img.rows; i++) {
                for (let j = 0; j < img.cols; j++) {
                    let pixelImg = img.ucharPtr(i, j);
                    let R = pixelImg[0];
                    let G = pixelImg[1];
                    let B = pixelImg[2];
                    
                    let m = Math.max(R, G, B);
                    let pixelMax = out.ucharPtr(i, j);
                    pixelMax[0] = m;
                }
            }

            return out;
        }

        function stack(img) {
            let out = new cv.Mat();
            let planes = new cv.MatVector();

            planes.push_back(img);
            planes.push_back(img);
            planes.push_back(img)

            cv.merge(planes, out);

            return out;
        }

        function color(img) {
            pos = locateWhite(img, [0, 0])
            while (pos) {
                cv.floodFill(img, new cv.Mat(), {x: pos[1], y: pos[0]}, colors[Math.floor(Math.random() * colors.length)]);
                pos = locateWhite(img, pos);
            }

            return img;
        }

        inputElement.addEventListener('change', (e) => {
            imgElement.src = URL.createObjectURL(e.target.files[0]);
        }, false);

        imgElement.onload = function () {
            let img = cv.imread(imgElement);
            img = color(stack(threshold(max(img))))

            cv.imshow('canvasOutput', img);
        };
    </script>
</body>

</html>
