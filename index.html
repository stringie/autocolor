<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="./LilitaOne-Regular.ttf" rel="stylesheet" />
    <!-- <link rel="preload" href="./LilitaOne-Regular.ttf" as="font" type="font/ttf" crossorigin> -->
    <script defer src="https://docs.opencv.org/4.6.0/opencv.js" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Autocolor</title>
</head>

<body style="background-color: #E8F1FF;">
    <div class="flex flex-col items-center">
        <div class="flex flex-row relative">
            <button id="title" onclick="autocolor()">
                <span style='color: #00FFF0'>A</span>
                <span style='color: #FF00E5'>u</span>
                <span style='color: #FFF500'>t</span>
                <span style='color: #05FF00'>o</span>
                <span style='color: #FF0000'>c</span>
                <span style='color: #2400FF'>o</span>
                <span style='color: #8F00FF'>l</span>
                <span style='color: #FF7A00'>o</span>
                <span style='color: #FF008A'>r</span>
            </button>
            <img hidden id="pressme" src="./images/pressme.svg" alt="" class="absolute top-2 -right-36">
        </div>
        <div class="flex flex-row gap-4">
            <div id="upload" class="upload-image relative">
                <div id="upload-box" class="upload-box">
                    <canvas id="canvas" class="absolute z-10"></canvas>
                </div>
                <div class="upload-text">
                    <img class="mx-auto -mb-7" src="./images/arrow.svg">
                    <img class="mx-auto mb-5" src="./images/box.svg">
                    <span>Choose an image or drag it here!</span>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <div class="colors-drop">
                    <div class="colors-drop-box"></div>
                    <span class="colors-drop-title">Colors</span>
                    <textarea id="colordrop" onchange="colorDrop()" class="colors-drop-text">#ffffff</textarea>
                </div>
                <button onclick="plusColor()" id="plus" class="add-button rounded-full my-1">
                    <div class="add-button-box rounded-full"></div>
                    <div class="add-button-hor-line"></div>
                    <div class="add-button-ver-line"></div>
                </button>
                <button onclick="minusColor()" id="minus" class="add-button rounded-full">
                    <div class="add-button-box rounded-full"></div>
                    <div class="add-button-ver-line"></div>
                </button>

                <div id="colors" class="flex flex-col">
                    <input id="color0" onchange="changeColor(this)" type="color" value="#ffffff" class="color" />
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        // Selection of colors with which to randomly fill assumed coloring page
        var colors = ["#ffffff"];
        var image;
        var upload = document.getElementById("upload");
        var uploadBox = document.getElementById("upload-box");

        // Create fake input element for uploading images
        var fakeInput = document.createElement("input");
        fakeInput.type = "file";
        fakeInput.accept = "image/*";
        fakeInput.multiple = false;
        upload.addEventListener('click', function () {
            fakeInput.click();
        });

        upload.addEventListener('dragenter', preventDefault, false);
        upload.addEventListener('dragleave', preventDefault, false);
        upload.addEventListener('dragover', preventDefault, false);
        upload.addEventListener('drop', preventDefault, false);
        upload.addEventListener('drop', handleImage, false);
        fakeInput.addEventListener('change', handleImage, false);

        function preventDefault(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function handleImage(e) {
            var files = e.target.files;
            if (!files) {
                files = e.dataTransfer.files;
            }

            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');

            var img = new Image;
            img.src = URL.createObjectURL(files[0]);
            img.onload = function () {
                image = cv.imread(img);
                image = stack(threshold(max(image)));

                canvas.height = 800;
                canvas.width = 800;
                let vRatio = canvas.height / img.height;
                let hRatio = canvas.width / img.width;
                let ratio = Math.min(hRatio, vRatio);

                uploadBox.style.width = img.width * ratio + "px";
                upload.style.width = img.width * ratio + "px";

                let showImage = new cv.Mat();
                cv.resize(image, showImage, new cv.Size(img.width * ratio, img.height * ratio));
                cv.imshow(canvas, showImage);

                showImage.delete()

                pressme();
            }
        }

        function pressme() {
            let pressme = document.getElementById("pressme");
            if (colors.length > 0 && image) {
                pressme.hidden = false;
            } else {
                pressme.hidden = true;
            }
        }

        function hexToRgb(hex) {
            hex = hex.trim().substring(1);
            var bigint = parseInt(hex, 16);
            var r = (bigint >> 16) & 255;
            var g = (bigint >> 8) & 255;
            var b = bigint & 255;

            if (r == 255) {
                r -= 1;
            }

            if (g == 255) {
                g -= 1;
            }

            if (b == 255) {
                b -= 1;
            }

            return [r, g, b, 255]
        }

        // Get 'Value' in HSV color space from RGB image (used for better thresholding)
        function max(img) {
            let out = new cv.Mat(img.rows, img.cols, cv.CV_8UC1);

            for (let i = 0; i < img.rows; i++) {
                for (let j = 0; j < img.cols; j++) {
                    let pixelImg = img.ucharPtr(i, j);
                    let R = pixelImg[0];
                    let G = pixelImg[1];
                    let B = pixelImg[2];

                    let m = Math.max(R, G, B);
                    let pixelMax = out.ucharPtr(i, j);
                    pixelMax[0] = m;
                }
            }

            img.delete();

            return out;
        }

        // Make all clearly black pixels based on threshold 0, else 255
        function threshold(img) {
            cv.adaptiveThreshold(img, img, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 43, 20)

            return img;
        }

        // Stack 3 threshold matrices ontop to make a single 3 channel RGB placeholder image for filling in colors
        function stack(img) {
            let out = new cv.Mat();
            let planes = new cv.MatVector();

            planes.push_back(img);
            planes.push_back(img);
            planes.push_back(img);

            cv.merge(planes, out);

            planes.delete();
            img.delete();

            return out;
        }

        // Use floodfill (paint-bucket tool) to fill in any large white connected structures in image
        function color(img) {
            // Move through the image, pixel by pixel, looking for a white pixel
            function locateWhite(img, startpos) {
                let pixel = img.ucharPtr(startpos[0], startpos[1]);

                while (pixel[0] != 255 || pixel[0] != 255 || pixel[0] != 255) {
                    startpos[1] = (startpos[1] + 1) % img.cols
                    if (startpos[1] == 0) {
                        startpos[0] += 1;
                    }

                    if (startpos[0] == img.rows - 1 && startpos[1] == img.cols - 1) {
                        return null;
                    }

                    pixel = img.ucharPtr(startpos[0], startpos[1]);
                }

                return startpos;
            };

            let pos = locateWhite(img, [0, 0])
            let mask = new cv.Mat.zeros(img.rows + 2, img.cols + 2, cv.CV_8UC1);
            while (pos) {
                cv.floodFill(img, mask, { x: pos[1], y: pos[0] }, hexToRgb(colors[Math.floor(Math.random() * colors.length)]));
                pos = locateWhite(img, pos);
            }

            return img;
        }

        function autocolor() {
            if (image) {
                let colorImage = color(image.clone());
                cv.resize(colorImage, colorImage, new cv.Size(canvas.width, canvas.height));
                cv.imshow(canvas, colorImage);

                colorImage.delete()
            }
        }

        function colorDrop() {
            let colorDropTextarea = document.getElementById("colordrop");
            colors = colorDropTextarea.value.split(",").map(s => s.trim());

            displayColors();
        }

        function plusColor(color = "#ffffff") {
            if (colors.length < 12) {
                colors.push(color);
            }

            displayColors();
        }

        function minusColor() {
            if (colors.length > 0) {
                colors.pop()
            }

            displayColors();
        }

        function changeColor(color) {
            let pos = color.id.split("color")[1];
            colors[pos] = color.value;

            displayColors();
        }

        function displayColors() {
            document.getElementById("colordrop").value = colors.join(",\n")

            let colorDiv = document.getElementById("colors");
            colorDiv.innerHTML = '';
            colors.map(c => {
                colorDiv.insertAdjacentHTML(
                    'beforeend',
                    `<input id="color${colorDiv.children.length}" onchange="changeColor(this)" type="color" value="${c}" class="color"/>`
                );
            });

            pressme();
        }
    </script>
</body>

</html>
